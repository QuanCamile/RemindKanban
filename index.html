<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RemindKanban — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090e17;
      --bg-gradient: linear-gradient(135deg, #090e17 0%, #111a2c 100%);
      --card-bg: rgba(17, 25, 40, 0.75);
      --card-border: rgba(255, 255, 255, 0.125);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;

      --status-blue: rgba(59, 130, 246, 0.2);
      --status-blue-text: #60a5fa;
      --status-green: rgba(16, 185, 129, 0.2);
      --status-green-text: #34d399;
      --status-orange: rgba(245, 158, 11, 0.2);
      --status-orange-text: #fbbf24;
      --status-red: rgba(239, 68, 68, 0.2);
      --status-red-text: #f87171;
      --status-gray: rgba(100, 116, 139, 0.2);
      --status-gray-text: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    /* Ambient background glow */
    body::before,
    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--accent);
      filter: blur(150px);
      opacity: 0.15;
      z-index: -1;
      animation: float 20s infinite ease-in-out alternate;
    }

    body::before {
      top: -100px;
      left: -100px;
    }

    body::after {
      bottom: -100px;
      right: -100px;
      animation-delay: -10s;
      background: #8b5cf6;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(50px, 50px);
      }
    }

    .container {
      width: 100%;
      max-width: 1000px;
      position: relative;
      z-index: 10;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.8s ease-out forwards;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 16px;
    }

    .glass-panel {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.8s ease-out forwards;
    }

    /* Table Styles */
    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      padding: 16px;
      border-bottom: 1px solid var(--card-border);
      font-weight: 600;
    }

    tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.2s;
    }

    tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 16px;
      font-size: 14px;
      vertical-align: middle;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .task-id {
      font-family: monospace;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .task-name {
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Status Colors */
    .status-giao-viec {
      background: var(--status-blue);
      color: var(--status-blue-text);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .status-dang-thuc-hien {
      background: var(--status-green);
      color: var(--status-green-text);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-cho-danh-gia {
      background: var(--status-orange);
      color: var(--status-orange-text);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-tre-han {
      background: var(--status-red);
      color: var(--status-red-text);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .status-da-pause,
    .status-tam-ngung {
      background: var(--status-gray);
      color: var(--status-gray-text);
      border: 1px solid rgba(100, 116, 139, 0.3);
    }

    .status-default {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.03) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
    }

    .sk-text {
      height: 16px;
      width: 80%;
      margin-bottom: 8px;
    }

    .sk-badge {
      height: 24px;
      width: 100px;
      border-radius: 20px;
    }

    .sk-id {
      height: 16px;
      width: 60px;
    }

    @keyframes loading {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-msg {
      color: var(--status-red-text);
      text-align: center;
      padding: 20px;
      font-weight: 500;
    }

    #stepNameDisplay {
      color: var(--accent-hover);
      font-weight: 600;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      gap: 4px;
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Danh sách Tasks</h1>
      <p>Cập nhật tự động từ hệ thống CDS</p>
    </header>

    <div class="glass-panel">
      <div
        style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; font-size: 15px;">
        <div>
          <span style="color: var(--text-secondary);">Step hiện tại:</span>
          <span id="stepNameDisplay" class="skeleton sk-text"
            style="display:inline-block; width:200px; vertical-align:middle; margin-left:8px; margin-bottom:0;"></span>
        </div>
        <button class="btn-action" onclick="reloadTasks(this)" title="Tải lại danh sách">🔄 Refresh</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th width="10%">ID</th>
              <th width="65%">Tên Task</th>
              <th width="25%">Trạng Thái</th>
            </tr>
          </thead>
          <tbody id="taskTableBody">
            <!-- Skeletons -->
            <tr>
              <td>
                <div class="skeleton sk-id"></div>
              </td>
              <td>
                <div class="skeleton sk-text"></div>
                <div class="skeleton sk-text" style="width:50%"></div>
              </td>
              <td>
                <div class="skeleton sk-badge"></div>
              </td>
            </tr>
            <tr>
              <td>
                <div class="skeleton sk-id"></div>
              </td>
              <td>
                <div class="skeleton sk-text"></div>
              </td>
              <td>
                <div class="skeleton sk-badge"></div>
              </td>
            </tr>
            <tr>
              <td>
                <div class="skeleton sk-id"></div>
              </td>
              <td>
                <div class="skeleton sk-text" style="width:70%"></div>
              </td>
              <td>
                <div class="skeleton sk-badge"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function getStatusClass(status) {
      const s = status.toLowerCase();
      if (s.includes('giao việc')) return 'status-giao-viec';
      if (s.includes('đang thực hiện')) return 'status-dang-thuc-hien';
      if (s.includes('chờ đánh giá')) return 'status-cho-danh-gia';
      if (s.includes('trễ hạn')) return 'status-tre-han';
      if (s.includes('đã pause') || s.includes('tạm ngừng')) return 'status-da-pause';
      return 'status-default';
    }

    async function reloadTasks(btn) {
      if (btn) {
        btn.disabled = true;
        const oldHtml = btn.innerHTML;
        btn.innerHTML = '⏳...';

        document.getElementById('taskTableBody').innerHTML = `
            <tr>
              <td><div class="skeleton sk-id"></div></td>
              <td><div class="skeleton sk-text"></div><div class="skeleton sk-text" style="width:50%"></div></td>
              <td><div class="skeleton sk-badge"></div></td>
            </tr>
            <tr>
              <td><div class="skeleton sk-id"></div></td>
              <td><div class="skeleton sk-text"></div></td>
              <td><div class="skeleton sk-badge"></div></td>
            </tr>
        `;
        document.getElementById('stepNameDisplay').className = "skeleton sk-text";
        document.getElementById('stepNameDisplay').textContent = "";

        await fetchTasks();

        btn.innerHTML = oldHtml;
        btn.disabled = false;
      }
    }

    async function fetchTasks() {
      const tbody = document.getElementById('taskTableBody');
      const stepNameEl = document.getElementById('stepNameDisplay');

      try {
        const response = await fetch('/api/tasks');
        const json = await response.json();

        if (!json.success) {
          throw new Error(json.message || "Failed to load tasks");
        }

        const data = json.data;

        // Remove skeleton class and set text
        stepNameEl.className = "";
        stepNameEl.textContent = `${data.step_name} (ID: ${data.step_id})`;

        tbody.innerHTML = '';

        if (!data.tasks || data.tasks.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: var(--text-secondary); padding: 30px;">Không có task nào trong step này.</td></tr>';
          return;
        }

        data.tasks.forEach((task, index) => {
          const tr = document.createElement('tr');
          tr.style.animation = `fadeInUp 0.4s ease-out ${index * 0.05}s forwards`;
          tr.style.opacity = '0';

          let actionHtml = '';
          if (task.status === "ĐANG THỰC HIỆN") {
            actionHtml = `<button class="btn-action" style="margin-left: 8px;" onclick="pauseTask('${task.id}', this)" title="Pause task">⏸️ Pause</button>`;
          }

          tr.innerHTML = `
            <td class="task-id">#${task.id}</td>
            <td class="task-name" title="${task.name}">${task.name}</td>
            <td style="white-space: nowrap;">
              <span class="badge ${getStatusClass(task.status)}" style="vertical-align: middle;">${task.status}</span>${actionHtml}
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="3"><div class="error-msg">⚠️ Lỗi: ${error.message}</div></td></tr>`;
        stepNameEl.className = "";
        stepNameEl.textContent = "Không xác định";
      }
    }

    async function pauseTask(taskId, btn) {
      if (!confirm(`Bạn có chắc muốn Pause task #${taskId}?`)) return;

      const originalText = btn.innerHTML;
      btn.innerHTML = '⏳...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/work/Task/DoingTask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ taskId })
        });
        const json = await res.json();

        if (!json.success) {
          throw new Error(json.message || 'Unknown error');
        }

        // Reload tasks to show updated status
        await fetchTasks();
      } catch (err) {
        alert('Lỗi khi pause task: ' + err.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    // Auto load on start
    document.addEventListener('DOMContentLoaded', fetchTasks);
  </script>
</body>

</html>
